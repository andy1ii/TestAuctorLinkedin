<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structural Overlaps - p5.js</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://unpkg.com/ccapture.js@1.0.9/build/CCapture.all.min.js"></script>
</head>
<body>

    <div id="controls">
        
        <div class="sidebar-header">
            <img src="resources/AuctorLogotypeFInal.png" alt="Auctor" class="brand-logo">
        </div>

        <div class="controls-content">
            <h2>Composition</h2>
            
            <div class="control-group switch-group">
                <label>Show Text Overlay</label>
                <label class="switch">
                    <input type="checkbox" id="showTextToggle" checked>
                    <span class="switch-slider"></span>
                </label>
            </div>
            
            <div class="control-group">
                <label>Primary Text</label>
                <textarea id="textInput1" rows="2">Member of Technical Staff</textarea>
            </div>

            <div class="control-group">
                <label>Secondary Text</label>
                <textarea id="textInput2" rows="2">at Auctor.</textarea>
            </div>
            
            <button id="btn-replay">Replay Animation</button>

            <div class="divider"></div>

            <div class="control-group" id="preset-group">
                <label>Color Presets</label>
                <select id="presetSelect">
                    <option value="auctorGreen">Auctor Green</option>
                    <option value="auctorOrange">Auctor Orange</option>
                    <option value="auctorBlue">Auctor Blue</option>
                    <option value="auctorRose">Auctor Rose</option>
                    <option value="auctorYellow">Auctor Yellow</option>
                    <option value="auctorGraphite">Auctor Graphite</option>
                    <option value="custom">-- Custom --</option>
                </select>
            </div>

            <div class="control-group">
                <label>Rendering Style</label>
                <select id="renderStyleSelect">
                    <option value="radial">Radial</option>
                    <option value="flat">Flat</option>
                </select>
            </div>
            
            <div id="flat-controls" style="display: none;">
                <div class="control-group color-row">
                    <div class="color-item">
                        <label>Background</label>
                        <div id="bgPicker" class="custom-color-picker">
                            <div class="selected-color"></div>
                            <div class="dropdown-swatches"></div>
                        </div>
                    </div>
                    <div class="color-item">
                        <label>Shape</label>
                        <div id="shapePicker" class="custom-color-picker">
                            <div class="selected-color"></div>
                            <div class="dropdown-swatches"></div>
                        </div>
                    </div>
                    <div class="color-item">
                        <label>Text</label>
                        <div id="textPicker" class="custom-color-picker">
                            <div class="selected-color"></div>
                            <div class="dropdown-swatches"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="radial-controls">
                <div class="control-group color-row">
                    <div class="color-item">
                        <label>Bg Center</label>
                        <div id="bgInnerPicker" class="custom-color-picker">
                            <div class="selected-color"></div>
                            <div class="dropdown-swatches"></div>
                        </div>
                    </div>
                    <div class="color-item">
                        <label>Bg Edge</label>
                        <div id="bgOuterPicker" class="custom-color-picker">
                            <div class="selected-color"></div>
                            <div class="dropdown-swatches"></div>
                        </div>
                    </div>
                </div>
                <div class="control-group color-row">
                    <div class="color-item">
                        <label>Shape Center</label>
                        <div id="shapeInnerPicker" class="custom-color-picker">
                            <div class="selected-color"></div>
                            <div class="dropdown-swatches"></div>
                        </div>
                    </div>
                    <div class="color-item">
                        <label>Shape Edge</label>
                        <div id="shapeOuterPicker" class="custom-color-picker">
                            <div class="selected-color"></div>
                            <div class="dropdown-swatches"></div>
                        </div>
                    </div>
                </div>
                
                <div class="control-group" style="margin-top: 15px;">
                    <label>Bg Gradient Spread</label>
                    <input type="range" id="bgSpreadSlider" min="10" max="300" step="1" value="100">
                </div>
                <div class="control-group">
                    <label>Shape Gradient Spread</label>
                    <input type="range" id="shapeSpreadSlider" min="10" max="300" step="1" value="100">
                </div>
            </div>

            <div class="divider"></div>

            <div class="control-group">
                <label>Layout Structure</label>
                <select id="layoutSelect">
                    <option value="venn">Venn Cluster</option>
                    <option value="verticalStack">Vertical Stack</option>
                    <option value="horizontalStack">Horizontal Stack</option>
                    <option value="concentric">Concentric Stack</option>
                    <option value="random">Random Drift</option>
                </select>
            </div>

            <div class="control-group">
                <label>Orb Spacing</label>
                <input type="range" id="spacingSlider" min="0" max="3" step="0.1" value="1">
            </div>

            <div class="control-group">
                <label>Orb Size</label>
                <input type="range" id="sizeSlider" min="0.1" max="3" step="0.1" value="1">
            </div>

            <div class="control-group">
                <label>Blur Amount</label>
                <input type="range" id="blurSlider" min="0" max="100" step="1" value="35">
            </div>

            <div class="control-group">
                <label>Complexity (Circles)</label>
                <input type="range" id="countSlider" min="2" max="4" step="1" value="3">
            </div>
        </div>

        <div class="sidebar-footer">
            <button id="btn-record">Export</button>
        </div>
    </div>

    <div id="main-area">
        <div id="recording-container">
            <div id="textOverlay"></div>
        </div>
    </div>

    <script src="recorder.js"></script>
    <script src="script.js"></script>
</body>
</html>
